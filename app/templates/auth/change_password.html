{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block topbar_title %}Change Password{% endblock %}
{% block content %}
<div class="ph"><div><h1>Change Password</h1><p>Update your login password</p></div></div>
<div class="card" style="max-width:460px">
  <form method="POST">
    <div class="fg"><label>Current Password</label><input type="password" name="current_password" required></div>
    <div class="fg"><label>New Password</label><input type="password" name="new_password" required minlength="6"></div>
    <div class="fg"><label>Confirm New Password</label><input type="password" name="confirm_password" required minlength="6"></div>
    <button type="submit" class="btn btn-p">Update Password</button>
  </form>
</div>
{% endblock %}
